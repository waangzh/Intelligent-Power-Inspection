name: Contract & Codegen

on:
  push:
    branches: [main, qy]
  pull_request:
    branches: [main]

jobs:
  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - run: npm run codegen
      - run: npm run codegen:check
      - run: npm run api:generate
      - run: npm run api:artifacts:check

  backend-contract:
    runs-on: ubuntu-latest
    needs: codegen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run auth/permission contract tests
        working-directory: backend
        run: mvn -q test -Dtest=PowerInspectionApplicationTests#defaultUsersCanLoginAndRolePermissionsAreEnforced+loginPermissionsMatchGeneratedManifest
