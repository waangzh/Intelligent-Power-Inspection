name: Contract & Codegen

on:
  push:
    branches: [main, qy]
    paths:
      - 'contracts/**'
      - 'scripts/**'
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/contract.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'scripts/**'
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/contract.yml'

jobs:
  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - run: npm run codegen
      - run: npm run codegen:check
      - run: npm run api:generate
      - run: npm run api:artifacts:check
