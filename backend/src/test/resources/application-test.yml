spring:
  datasource:
    url: jdbc:h2:mem:power_inspection;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  scheduling:
    enabled: false
  jwt:
    secret: test-secret-for-power-inspection
    access-ttl-seconds: 3600
    refresh-session-ttl-seconds: 7200
    refresh-remember-ttl-seconds: 604800
    reauth-window-seconds: 86400
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  model:
    mode: mock
  agent:
    orchestration:
      auto-execution-enabled: true
  robot:
    mode: simulation
    allow-registration: false
    bridge-robot-id-mappings:
      robot_001: robot-001
  sms:
    # 默认 mock，避免单测误发真短信；本地真发可设 APP_SMS_MODE=pnvs
    mode: ${APP_SMS_MODE:mock}
    # 本地 H2(test) 与正式一致默认 30s；单测若需加速可设 APP_SMS_RESEND_INTERVAL_SECONDS=1
    resend-interval-seconds: ${APP_SMS_RESEND_INTERVAL_SECONDS:30}
    daily-limit-per-phone: 100
