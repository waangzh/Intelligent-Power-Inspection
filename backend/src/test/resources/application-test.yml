spring:
  datasource:
    url: jdbc:h2:mem:power_inspection;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-for-power-inspection
    access-ttl-seconds: 3600
    refresh-session-ttl-seconds: 7200
    refresh-remember-ttl-seconds: 604800
    reauth-window-seconds: 86400
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  model:
    mode: mock
  agent:
    orchestration:
      auto-execution-enabled: true
  robot:
    mode: simulation
    allow-registration: false
