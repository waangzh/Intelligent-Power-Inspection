server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: 8080

spring:
  application:
    name: power-inspection-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/power_inspection?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  map-assets:
    max-yaml-bytes: ${MAP_ASSET_MAX_YAML_BYTES:1048576}
    max-pgm-bytes: ${MAP_ASSET_MAX_PGM_BYTES:104857600}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-for-production}
    ttl-seconds: ${JWT_TTL_SECONDS:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  model:
    mode: http
    service-token: ${APP_MODEL_SERVICE_TOKEN:}
    locate-anything:
      base-url: http://127.0.0.1:9001
      timeout-seconds: 900
      generation-mode: fast
    llm:
      base-url: ${APP_MODEL_LLM_BASE_URL:http://127.0.0.1:9003}
      api-key: ${APP_MODEL_LLM_API_KEY:}
      model: ${APP_MODEL_LLM_MODEL:gpt-4o-mini}
      timeout-seconds: ${APP_MODEL_LLM_TIMEOUT_SECONDS:60}
  robot:
    mode: ${APP_ROBOT_MODE:simulation}
    bridge-base-url: ${APP_ROBOT_BRIDGE_URL:http://127.0.0.1:8000}
    robot-id: ${APP_ROBOT_ID:robot_001}
    poll-interval-ms: ${APP_ROBOT_POLL_MS:2000}
    timeout-seconds: ${APP_ROBOT_TIMEOUT_SECONDS:5}
    token: ${APP_ROBOT_BRIDGE_TOKEN:}
    # Bridge 管理面只允许 Spring 服务端访问；Token 不得下发到浏览器或机器人。
    heartbeat-bridge-base-url: ${ROBOT_BRIDGE_BASE_URL:http://127.0.0.1:8001}
    bridge-admin-token: ${ROBOT_BRIDGE_ADMIN_TOKEN:}
    bridge-connect-timeout-seconds: ${ROBOT_BRIDGE_CONNECT_TIMEOUT_SECONDS:3}
    bridge-read-timeout-seconds: ${ROBOT_BRIDGE_READ_TIMEOUT_SECONDS:10}
    heartbeat-sync-interval-ms: ${ROBOT_HEARTBEAT_SYNC_INTERVAL_MS:3000}
    heartbeat-timeout-seconds: ${ROBOT_HEARTBEAT_TIMEOUT_SECONDS:12}
    # 平台 ID 与设备 ID 不一致时在此映射；平台数据库仍保留 robot_001。
    bridge-robot-id-mappings:
      robot_001: ${APP_ROBOT_BRIDGE_ID_ROBOT_001:robot-001}
    # 设置为 Robot Bridge 的 PLATFORM_BEARER_TOKEN，使部署回读响应使用 Bridge ID。
    bridge-platform-token: ${ROBOT_BRIDGE_PLATFORM_TOKEN:}
  route-deployment:
    worker-delay-ms: ${ROUTE_DEPLOYMENT_WORKER_DELAY_MS:3000}
    worker-initial-delay-ms: ${ROUTE_DEPLOYMENT_WORKER_INITIAL_DELAY_MS:5000}
    worker-batch-size: ${ROUTE_DEPLOYMENT_WORKER_BATCH_SIZE:10}
    max-attempts: ${ROUTE_DEPLOYMENT_MAX_ATTEMPTS:5}
    initial-backoff-seconds: ${ROUTE_DEPLOYMENT_INITIAL_BACKOFF_SECONDS:5}
    max-backoff-seconds: ${ROUTE_DEPLOYMENT_MAX_BACKOFF_SECONDS:300}
