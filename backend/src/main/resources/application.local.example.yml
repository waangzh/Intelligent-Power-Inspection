# 复制为 application.yml（该文件已 gitignore，勿提交密钥）
#   copy application.example.yml application.yml
# 再按下面覆盖 sms / server 段，或直接使用本文件内容合并进 application.yml

server:
  # 真机调试小程序时需监听局域网；仅本机模拟器可用 127.0.0.1
  address: 0.0.0.0
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/power_inspection?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: YOUR_MYSQL_PASSWORD

app:
  sms:
    # pnvs = 阿里云号码认证真发短信；mock = 仅返回 debugCode，不发短信
    mode: pnvs
    access-key-id: YOUR_ALIYUN_ACCESS_KEY_ID
    access-key-secret: YOUR_ALIYUN_ACCESS_KEY_SECRET
    sign-name: YOUR_PNVS_SIGN_NAME
    template-code: "100001"
    reset-template-code: "100003"
